<!DOCTYPE html>
<html>
<head>
  <title>Smart Fridge Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/browser@latest"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    h2 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>📦 Scan Product</h2>

<video id="reader" width="300" height="250"></video>

<p id="result">Scanned Code: </p>

<script>
  const codeReader = new ZXing.BrowserMultiFormatReader();
  let lastScanned = "";

  codeReader.listVideoInputDevices()
    .then(videoInputDevices => {
      const selectedDeviceId = videoInputDevices[0].deviceId;

      codeReader.decodeFromVideoDevice(selectedDeviceId, 'reader', (result, err) => {
        if (result) {
          let scannedCode = result.text;

          // prevent duplicate scans
          if (scannedCode !== lastScanned) {
            lastScanned = scannedCode;

            document.getElementById("result").innerText =
              "Scanned Code: " + scannedCode;

            // 🔥 SEND TO ESP32
            fetch("http://192.168.x.x/scan?code=" + scannedCode)
              .then(() => console.log("Sent to ESP32"))
              .catch(() => console.log("Error sending"));
          }
        }
      });
    })
    .catch(err => console.error(err));
</script>

</body>
</html>
